<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Cyteki 打ち上げ調整</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{background:#f5f5f3;font-family:"Hiragino Kaku Gothic ProN","Yu Gothic","Meiryo",sans-serif;color:#1a1a1a;min-height:100vh;}
.app{max-width:600px;margin:0 auto;padding:1.5rem 1rem;}
.card{background:#fff;border:1px solid #e5e5e2;border-radius:14px;padding:1.25rem;margin-bottom:1rem;box-shadow:0 1px 4px rgba(0,0,0,.04);}
.btn{display:block;width:100%;padding:12px 16px;border:1px solid #d0d0cc;border-radius:10px;background:transparent;font-size:14px;font-weight:500;color:#1a1a1a;cursor:pointer;text-align:center;margin-bottom:8px;font-family:inherit;transition:background .15s;}
.btn:hover{background:#f0f0ee;}
.btn:active{transform:scale(0.98);}
.btn-p{background:#1a56db;color:#fff;border-color:#1a56db;}
.btn-p:hover{background:#1648c0;}
.btn-sm{display:inline-block;width:auto;padding:7px 14px;font-size:13px;}
.lbl{font-size:12px;color:#888;margin-bottom:5px;}
.vote-row{display:flex;align-items:center;gap:8px;padding:10px 12px;border:1px solid #e5e5e2;border-radius:10px;margin-bottom:8px;background:#fff;}
.vd{flex:1;font-size:13px;}
.vb{width:44px;height:38px;border:1px solid #d0d0cc;border-radius:9px;background:transparent;cursor:pointer;font-size:16px;display:flex;align-items:center;justify-content:center;transition:background .12s;}
.vb:hover{background:#f0f0ee;}
.vb.maru{background:#dcfce7;border-color:#86efac;}
.vb.sankaku{background:#fef9c3;border-color:#fde047;}
.vb.batsu{background:#fee2e2;border-color:#fca5a5;}
.gg{display:grid;grid-template-columns:repeat(auto-fit,minmax(130px,1fr));gap:7px;}
.gb{padding:9px 10px;border:1px solid #d0d0cc;border-radius:10px;background:transparent;font-size:13px;cursor:pointer;text-align:center;color:#1a1a1a;font-family:inherit;transition:background .12s;}
.gb:hover{background:#f0f0ee;}
.gb.sel{background:#eff6ff;border-color:#93c5fd;color:#1d4ed8;}
.steps{display:flex;align-items:center;gap:6px;margin-bottom:1.25rem;}
.sd{width:8px;height:8px;border-radius:50%;background:#d0d0cc;}
.sd.on{background:#1a56db;}
.sd.dn{background:#22c55e;}
.bar-wrap{flex:1;background:#f0f0ee;border-radius:4px;height:16px;overflow:hidden;}
.bar-fill{height:100%;background:#93c5fd;border-radius:4px;}
.comment-bubble{background:#f8f8f6;border-radius:10px;padding:10px 13px;margin-bottom:8px;}
.comment-name{font-size:11px;font-weight:600;color:#888;margin-bottom:4px;}
.comment-text{font-size:13px;line-height:1.65;}
.url-box{background:#f0f4ff;border:1px solid #93c5fd;border-radius:10px;padding:12px;word-break:break-all;font-size:13px;color:#1d4ed8;margin-bottom:10px;line-height:1.6;}
input[type=text],input[type=password],input[type=date]{width:100%;padding:10px 12px;border:1px solid #d0d0cc;border-radius:9px;font-size:14px;font-family:inherit;background:#fff;color:#1a1a1a;outline:none;transition:border .15s;}
input:focus{border-color:#1a56db;}
textarea{width:100%;padding:10px 12px;border:1px solid #d0d0cc;border-radius:9px;font-size:14px;font-family:inherit;background:#fff;color:#1a1a1a;outline:none;resize:vertical;transition:border .15s;}
textarea:focus{border-color:#1a56db;}
</style>
</head>
<body>
<div id="app" class="app"><div style="text-align:center;padding:3rem;color:#888">読み込み中...</div></div>
<script>
const MASTER_KEY='$2a$10$72ahDBTL8CQmr.ClFvvWpeZF0vC2FtxagebZtHOlrADW5JDslWMkq';
const API='https://api.jsonbin.io/v3/b';
const GENRES=['和食','焼肉・ホルモン','寿司・海鮮','中華料理','イタリアン・洋食','居酒屋・焼き鳥','鍋料理','ステーキ・肉料理','アジア・エスニック','韓国料理','ラーメン・麺類','カフェ・ビストロ'];

let binId=null, data={config:null,responses:{}};
let scr='loading', p={name:'',dates:{},genres:[],dislikes:'',comment:''}, tmpDates=null;
const app=document.getElementById('app');

function getBinId(){return location.hash.replace('#','').trim()||null;}

async function apiFetch(method,path,body){
  const r=await fetch(API+path,{
    method,
    headers:{'Content-Type':'application/json','X-Master-Key':MASTER_KEY,'X-Bin-Versioning':'false'},
    body:body?JSON.stringify(body):undefined
  });
  if(!r.ok)throw new Error('API '+r.status);
  return r.json();
}

async function init(){
  binId=getBinId();
  if(!binId){scr='setup_new';render();return;}
  try{
    const r=await apiFetch('GET','/'+binId+'/latest');
    data=r.record;
    if(!data.responses)data.responses={};
    scr='home';
  }catch{
    app.innerHTML='<div style="text-align:center;padding:2rem;color:#ef4444">データの読み込みに失敗しました。<br>URLが正しいか確認してください。</div>';
    return;
  }
  render();
}

async function saveData(){await apiFetch('PUT','/'+binId,data);}

function go(s){scr=s;tmpDates=null;render();}
function showMsg(m){app.innerHTML=`<div style="text-align:center;padding:3rem;color:#888">${m}</div>`;}

function stepDots(c){
  return `<div class="steps">${[1,2,3,4].map(i=>`<div class="sd ${i<c?'dn':i===c?'on':''}"></div>`).join('')}<span style="font-size:12px;color:#888;margin-left:2px">STEP ${c}/4</span></div>`;
}
function fmtD(d){const dt=new Date(d+'T00:00:00'),dy=['日','月','火','水','木','金','土'];return `${dt.getMonth()+1}月${dt.getDate()}日（${dy[dt.getDay()]}）`;}
function fmtDs(d){const dt=new Date(d+'T00:00:00'),dy=['日','月','火','水','木','金','土'];return `${dt.getMonth()+1}/${dt.getDate()}<br><span style="font-size:10px">${dy[dt.getDay()]}</span>`;}

function render(){
  ({setup_new:renderSetupNew,share_url:renderShareUrl,home:renderHome,alog:renderAlog,aset:renderAset,pname:renderPname,pdates:renderPdates,pfood:renderPfood,pcomment:renderPcomment,pdone:renderPdone,result:renderResult}[scr]||renderHome)();
}

// ── 初回セットアップ ──
function renderSetupNew(){
  if(!tmpDates)tmpDates=['','',''];
  app.innerHTML=`
    <div style="text-align:center;padding:2rem 0 1rem">
      <div style="font-size:28px;margin-bottom:8px">🎉</div>
      <p style="font-size:18px;font-weight:600;margin-bottom:4px">打ち上げ調整アプリ</p>
      <p style="font-size:13px;color:#888;margin-bottom:1.5rem">初回セットアップ</p>
    </div>
    <div class="card">
      <p class="lbl">イベント名</p>
      <input type="text" id="etitle" placeholder="例: Cyteki 打ち上げ" style="margin-bottom:1rem" />
      <p class="lbl">管理者パスワード</p>
      <input type="password" id="npw" placeholder="パスワードを設定" style="margin-bottom:1rem" />
      <p class="lbl">日程候補</p>
      <div id="dc"></div>
      <button class="btn" onclick="addDate()">＋ 日程を追加</button>
      <hr style="border:none;border-top:1px solid #e5e5e2;margin:1rem 0" />
      <button class="btn btn-p" onclick="createApp()">アプリを作成して共有URLを発行 🚀</button>
    </div>`;
  reRenderDates();
}

function collectDates(){
  document.querySelectorAll('[id^="di"]').forEach((el,i)=>{if(tmpDates[i]!==undefined)tmpDates[i]=el.value;});
}
function addDate(){collectDates();tmpDates.push('');reRenderDates();}
function rmDate(i){collectDates();tmpDates.splice(i,1);reRenderDates();}
function reRenderDates(){
  const c=document.getElementById('dc');
  if(!c)return;
  c.innerHTML=tmpDates.map((d,i)=>`<div style="display:flex;gap:7px;margin-bottom:7px"><input type="date" id="di${i}" value="${d}" style="flex:1;width:auto"><button onclick="rmDate(${i})" style="padding:0 12px;border:1px solid #d0d0cc;border-radius:9px;background:transparent;cursor:pointer;color:#888">✕</button></div>`).join('');
}

async function createApp(){
  collectDates();
  const title=document.getElementById('etitle').value.trim();
  const pw=document.getElementById('npw').value;
  const dates=(tmpDates||[]).filter(d=>d).sort();
  if(!title){alert('イベント名を入力してください');return;}
  if(!pw){alert('パスワードを設定してください');return;}
  if(!dates.length){alert('日程候補を1件以上入力してください');return;}
  showMsg('データを作成中...');
  try{
    const init={config:{eventTitle:title,adminPass:pw,dates},responses:{}};
    const r=await apiFetch('POST','',init);
    binId=r.metadata.id;
    data=init;
    location.hash=binId;
    scr='share_url';render();
  }catch(e){
    app.innerHTML='<div style="text-align:center;padding:2rem;color:#ef4444">作成に失敗しました。APIキーを確認してください。</div>';
  }
}

// ── URL共有画面 ──
function renderShareUrl(){
  const url=location.href;
  app.innerHTML=`
    <div style="text-align:center;padding:1.5rem 0 1rem">
      <div style="font-size:32px;margin-bottom:8px">✅</div>
      <p style="font-size:18px;font-weight:600;margin-bottom:4px">アプリが作成されました！</p>
      <p style="font-size:13px;color:#888">このURLをチームにLINE・Slackで送ってください</p>
    </div>
    <div class="card">
      <p class="lbl" style="margin-bottom:8px">📎 チーム共有URL</p>
      <div class="url-box" id="shareurl">${url}</div>
      <button class="btn btn-p" onclick="copyUrl()">URLをコピーする 📋</button>
      <p style="font-size:12px;color:#e87700;margin-top:8px;line-height:1.6">⚠ このURLを知っている人全員がデータを見られます。社外には共有しないでください。</p>
    </div>
    <button class="btn btn-p" onclick="go('home')">アプリを使い始める →</button>`;
}
function copyUrl(){
  const u=document.getElementById('shareurl').textContent;
  navigator.clipboard.writeText(u).then(()=>alert('コピーしました！')).catch(()=>alert('手動でコピーしてください:\n'+u));
}

// ── ホーム ──
function renderHome(){
  app.innerHTML=`
    <div style="text-align:center;padding:2.5rem 0 1.25rem">
      <div style="font-size:32px;margin-bottom:10px">🎉</div>
      <p style="font-size:22px;font-weight:600;margin-bottom:6px">${data.config?.eventTitle||'打ち上げ調整'}</p>
      <p style="font-size:13px;color:#888">Cyteki チーム</p>
    </div>
    <div class="card">
      <button class="btn btn-p" onclick="startP()">✏ 希望を入力する</button>
      <button class="btn" onclick="refreshAndGo('result')">📊 みんなの結果を見る</button>
      <button class="btn" style="font-size:12px;color:#aaa" onclick="startAdmin()">⚙ 管理者設定</button>
    </div>`;
}
function startP(){
  if(!data.config?.dates?.length){alert('先に管理者が日程候補を設定してください');return;}
  p={name:'',dates:{},genres:[],dislikes:'',comment:''};go('pname');
}
function startAdmin(){if(data.config?.adminPass)go('alog');else go('aset');}
async function refreshAndGo(s){
  showMsg('読み込み中...');
  try{const r=await apiFetch('GET','/'+binId+'/latest');data=r.record;if(!data.responses)data.responses={};}catch{}
  go(s);
}

// ── 管理者ログイン ──
function renderAlog(){
  app.innerHTML=`
    <button class="btn btn-sm" style="margin-bottom:1rem" onclick="go('home')">← 戻る</button>
    <div class="card">
      <p style="font-size:16px;font-weight:600;margin-bottom:1rem">管理者ログイン</p>
      <p class="lbl">パスワード</p>
      <input type="password" id="pw" style="margin-bottom:10px" placeholder="パスワードを入力">
      <button class="btn btn-p" onclick="checkPw()">ログイン</button>
      <p id="perr" style="color:#ef4444;font-size:12px;margin-top:6px;display:none">パスワードが違います</p>
    </div>`;
}
function checkPw(){
  if(document.getElementById('pw').value===data.config.adminPass)go('aset');
  else document.getElementById('perr').style.display='block';
}

// ── 管理者設定 ──
function renderAset(){
  if(!tmpDates)tmpDates=(data.config?.dates||['','']).slice();
  app.innerHTML=`
    <button class="btn btn-sm" style="margin-bottom:1rem" onclick="go('home')">← ホームへ</button>
    <div class="card">
      <p style="font-size:16px;font-weight:600;margin-bottom:1rem">管理者設定</p>
      <p class="lbl">イベント名</p>
      <input type="text" id="etitle" value="${data.config?.eventTitle||''}" placeholder="例: Cyteki 打ち上げ" style="margin-bottom:1rem">
      <p class="lbl">${data.config?.adminPass?'パスワード変更（空欄なら変更なし）':'管理者パスワード'}</p>
      <input type="password" id="npw" placeholder="${data.config?.adminPass?'新しいパスワード':'パスワードを設定'}" style="margin-bottom:1rem">
      <p class="lbl">日程候補</p>
      <div id="dc"></div>
      <button class="btn" onclick="addDate()">＋ 日程を追加</button>
      <hr style="border:none;border-top:1px solid #e5e5e2;margin:1rem 0">
      <button class="btn btn-p" onclick="saveAdmin()">保存する</button>
      <button class="btn" style="font-size:12px;color:#888;margin-top:4px" onclick="scr='share_url';render()">📎 共有URLを確認する</button>
      <button class="btn" style="font-size:12px;color:#ef4444;margin-top:4px" onclick="resetAll()">⚠ 全回答をリセット</button>
    </div>`;
  reRenderDates();
}
async function saveAdmin(){
  collectDates();
  const title=document.getElementById('etitle').value.trim();
  const pw=document.getElementById('npw').value;
  const dates=(tmpDates||[]).filter(d=>d).sort();
  if(!title){alert('イベント名を入力してください');return;}
  if(!dates.length){alert('日程候補を1件以上入力してください');return;}
  showMsg('保存中...');
  data.config={eventTitle:title,adminPass:pw||data.config?.adminPass||'',dates};
  tmpDates=null;
  await saveData();
  alert('保存しました！');go('home');
}
async function resetAll(){
  if(!confirm('全参加者の回答を削除しますか？'))return;
  showMsg('リセット中...');
  data.responses={};await saveData();alert('リセットしました');go('home');
}

// ── 参加者：名前 ──
function renderPname(){
  const names=Object.keys(data.responses);
  app.innerHTML=`
    <button class="btn btn-sm" style="margin-bottom:1rem" onclick="go('home')">← 戻る</button>
    ${stepDots(1)}
    <div class="card">
      <p style="font-size:16px;font-weight:600;margin-bottom:4px">あなたのお名前は？</p>
      <p style="font-size:13px;color:#888;margin-bottom:1rem">参加者として回答します</p>
      <input type="text" id="pn" placeholder="例: 田中 太郎" style="margin-bottom:12px">
      ${names.length?`<div style="margin-bottom:12px"><p class="lbl">回答済み（${names.length}名）</p><div style="display:flex;flex-wrap:wrap;gap:5px">${names.map(n=>`<span style="font-size:11px;background:#f0f0ee;padding:3px 10px;border-radius:100px;color:#888">${n}</span>`).join('')}</div></div>`:''}
      <button class="btn btn-p" onclick="subName()">次へ →</button>
    </div>`;
}
function subName(){
  const name=document.getElementById('pn').value.trim();
  if(!name){alert('名前を入力してください');return;}
  p.name=name;
  if(data.responses[name]){
    if(!confirm(`「${name}」さんはすでに回答済みです。上書きしますか？`))return;
    const r=data.responses[name];
    p.dates={...r.dates};p.genres=[...(r.genres||[])];p.dislikes=r.dislikes||'';p.comment=r.comment||'';
  }
  go('pdates');
}

// ── 参加者：日程 ──
function renderPdates(){
  const rows=data.config.dates.map(d=>{
    const v=p.dates[d]||'';
    return `<div class="vote-row"><div class="vd">${fmtD(d)}</div>
      <button class="vb ${v==='○'?'maru':''}" onclick="setV('${d}','○')">○</button>
      <button class="vb ${v==='△'?'sankaku':''}" onclick="setV('${d}','△')">△</button>
      <button class="vb ${v==='✗'?'batsu':''}" onclick="setV('${d}','✗')">✗</button>
    </div>`;
  }).join('');
  app.innerHTML=`
    <button class="btn btn-sm" style="margin-bottom:1rem" onclick="go('pname')">← 戻る</button>
    ${stepDots(2)}
    <div class="card">
      <p style="font-size:16px;font-weight:600;margin-bottom:4px">日程を教えてください</p>
      <p style="font-size:12px;color:#888;margin-bottom:1rem">○ 参加できる ／ △ たぶん ／ ✗ 無理</p>
      ${rows}
      <button class="btn btn-p" style="margin-top:8px" onclick="go('pfood')">次へ →</button>
    </div>`;
}
function setV(d,v){p.dates[d]=v;renderPdates();}

// ── 参加者：食事 ──
function renderPfood(){
  const gHtml=GENRES.map(g=>`<button class="gb ${p.genres.includes(g)?'sel':''}" onclick="togG('${g}')">${g}</button>`).join('');
  app.innerHTML=`
    <button class="btn btn-sm" style="margin-bottom:1rem" onclick="go('pdates')">← 戻る</button>
    ${stepDots(3)}
    <div class="card">
      <p style="font-size:16px;font-weight:600;margin-bottom:4px">食事の希望</p>
      <p class="lbl" style="margin-bottom:9px">食べたいジャンル（複数可）</p>
      <div class="gg">${gHtml}</div>
      <p class="lbl" style="margin-top:1.25rem;margin-bottom:5px">苦手・嫌いなもの（任意）</p>
      <textarea id="dis" style="height:72px" placeholder="例: パクチー、レバー、辛いもの">${p.dislikes}</textarea>
      <button class="btn btn-p" style="margin-top:12px" onclick="goFood()">次へ →</button>
    </div>`;
}
function togG(g){
  p.dislikes=document.getElementById('dis')?.value??p.dislikes;
  const i=p.genres.indexOf(g);if(i>=0)p.genres.splice(i,1);else p.genres.push(g);
  renderPfood();
}
function goFood(){p.dislikes=document.getElementById('dis').value;go('pcomment');}

// ── 参加者：コメント ──
function renderPcomment(){
  app.innerHTML=`
    <button class="btn btn-sm" style="margin-bottom:1rem" onclick="go('pfood')">← 戻る</button>
    ${stepDots(4)}
    <div class="card">
      <p style="font-size:16px;font-weight:600;margin-bottom:4px">一言コメント</p>
      <p style="font-size:13px;color:#888;margin-bottom:1rem">みんなへのメッセージや希望（任意）</p>
      <textarea id="cmt" style="height:110px;line-height:1.65" placeholder="例：個室があるとうれしいです！">${p.comment}</textarea>
      <button class="btn btn-p" style="margin-top:12px" onclick="subP()">回答を送信する 🎉</button>
    </div>`;
}
async function subP(){
  p.comment=document.getElementById('cmt').value;
  showMsg('送信中...');
  try{const r=await apiFetch('GET','/'+binId+'/latest');data=r.record;if(!data.responses)data.responses={};}catch{}
  data.responses[p.name]={dates:{...p.dates},genres:[...p.genres],dislikes:p.dislikes,comment:p.comment};
  await saveData();
  go('pdone');
}

// ── 完了 ──
function renderPdone(){
  app.innerHTML=`
    <div style="text-align:center;padding:3rem 1rem">
      <div style="font-size:42px;margin-bottom:14px">🎊</div>
      <p style="font-size:18px;font-weight:600;margin-bottom:6px">ありがとうございます！</p>
      <p style="font-size:13px;color:#888;margin-bottom:1.5rem">${p.name}さんの回答を保存しました</p>
      <button class="btn btn-p" onclick="refreshAndGo('result')">📊 結果を見る</button>
      <button class="btn" style="margin-top:4px" onclick="go('home')">ホームへ</button>
    </div>`;
}

// ── 結果 ──
function renderResult(){
  if(!data.config){
    app.innerHTML=`<button class="btn btn-sm" style="margin-bottom:1rem" onclick="go('home')">← 戻る</button><p style="color:#888;text-align:center;padding:2rem">まだ設定がありません</p>`;
    return;
  }
  const names=Object.keys(data.responses),dates=data.config.dates;
  const dHd=dates.map(d=>`<th style="padding:6px 4px;font-size:11px;font-weight:500;color:#888;text-align:center;min-width:52px">${fmtDs(d)}</th>`).join('');
  const rows=names.length?names.map(n=>{
    const r=data.responses[n];
    const cells=dates.map(d=>{
      const v=r.dates[d]||'－';
      const col=v==='○'?'#16a34a':v==='△'?'#ca8a04':v==='✗'?'#dc2626':'#ccc';
      return `<td style="text-align:center;padding:8px 4px;font-size:16px;color:${col}">${v}</td>`;
    }).join('');
    return `<tr><td style="padding:6px;font-size:12px;font-weight:600;white-space:nowrap"><div style="display:flex;align-items:center;gap:5px">${n}<button onclick="editPerson(this)" data-name="${n}" style="font-size:10px;padding:2px 7px;border:1px solid #d0d0cc;border-radius:6px;background:transparent;cursor:pointer;color:#888">✏</button></div></td>${cells}</tr>`;
  }).join(''):`<tr><td colspan="${dates.length+1}" style="padding:16px;text-align:center;color:#888;font-size:13px">まだ回答がありません</td></tr>`;

  const tots=dates.map(d=>{
    const ma=names.filter(n=>data.responses[n].dates[d]==='○').length;
    const sa=names.filter(n=>data.responses[n].dates[d]==='△').length;
    return `<td style="text-align:center;padding:5px 4px;font-size:11px;color:#888">○${ma} △${sa}</td>`;
  }).join('');

  const gc={};
  names.forEach(n=>(data.responses[n].genres||[]).forEach(g=>{gc[g]=(gc[g]||0)+1;}));
  const sg=Object.entries(gc).sort((a,b)=>b[1]-a[1]);
  const mx=sg[0]?.[1]||1;
  const gHtml=sg.length?sg.map(([g,c])=>`<div style="display:flex;align-items:center;gap:8px;margin-bottom:8px"><div style="font-size:12px;min-width:108px">${g}</div><div class="bar-wrap"><div class="bar-fill" style="width:${Math.round(c/mx*100)}%"></div></div><div style="font-size:12px;font-weight:600;color:#1a56db;min-width:28px">${c}人</div></div>`).join(''):`<p style="font-size:13px;color:#888">まだ回答がありません</p>`;

  const diHtml=names.filter(n=>data.responses[n].dislikes).map(n=>`<div style="padding:7px 0;border-bottom:1px solid #e5e5e2"><span style="font-size:11px;font-weight:600;color:#888">${n}：</span><span style="font-size:13px">${data.responses[n].dislikes}</span></div>`).join('')||`<p style="font-size:13px;color:#888">特になし</p>`;

  const cmtHtml=names.filter(n=>data.responses[n].comment).map(n=>`<div class="comment-bubble"><div class="comment-name">${n}</div><div class="comment-text">${data.responses[n].comment.replace(/\n/g,'<br>')}</div></div>`).join('')||`<p style="font-size:13px;color:#888">まだコメントがありません</p>`;

  app.innerHTML=`
    <button class="btn btn-sm" style="margin-bottom:1rem" onclick="go('home')">← 戻る</button>
    <p style="font-size:20px;font-weight:600;margin-bottom:4px">結果まとめ</p>
    <p style="font-size:13px;color:#888;margin-bottom:1rem">${data.config.eventTitle} · ${names.length}名回答済み</p>
    <div style="text-align:right;margin-bottom:8px"><button class="btn btn-sm" onclick="refreshAndGo('result')">🔄 最新データを取得</button></div>
    <div class="card">
      <p style="font-size:14px;font-weight:600;margin-bottom:10px">📅 日程</p>
      <div style="overflow-x:auto"><table style="width:100%;border-collapse:collapse">
        <thead><tr><th style="padding:6px;font-size:11px;font-weight:500;color:#888;text-align:left;width:80px">名前</th>${dHd}</tr></thead>
        <tbody>${rows}${names.length?`<tr style="border-top:1px solid #e5e5e2"><td style="font-size:11px;padding:5px 6px;color:#888">集計</td>${tots}</tr>`:''}</tbody>
      </table></div>
    </div>
    <div class="card"><p style="font-size:14px;font-weight:600;margin-bottom:10px">🍽 食べたいジャンル</p>${gHtml}</div>
    <div class="card"><p style="font-size:14px;font-weight:600;margin-bottom:8px">⚠ 苦手なもの</p>${diHtml}</div>
    <div class="card"><p style="font-size:14px;font-weight:600;margin-bottom:10px">💬 みんなのコメント</p>${cmtHtml}</div>`;
}

function editPerson(btn){
  const name=btn.getAttribute('data-name');
  const r=data.responses[name];
  p={name,dates:{...r.dates},genres:[...(r.genres||[])],dislikes:r.dislikes||'',comment:r.comment||''};
  go('pdates');
}

init();
</script>
</body>
</html>
